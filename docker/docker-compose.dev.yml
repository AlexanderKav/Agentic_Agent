services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agentic-analyst-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agentic_analyst
      - SECRET_KEY=${SECRET_KEY}
      - AUDIT_SECRET_KEY=${AUDIT_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/google-credentials.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../logs:/app/logs
      - ../agents/charts:/app/agents/charts
      - ../data:/app/data
      # Mount your credentials file from Windows to container
      - C:/Users/alexk/Desktop/agentic-analyst/agentic-analyst-489012-a0aa86d33643.json:/app/credentials/google-credentials.json
    networks:
      - agentic-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:15-alpine
    container_name: agentic-analyst-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agentic_analyst
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agentic-analyst-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentic-network
    restart: unless-stopped

networks:
  agentic-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: