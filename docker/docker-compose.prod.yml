# docker/docker-compose.prod.yml
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: agentic-analyst-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agentic_analyst
      # Security keys - these should be in .env.prod, not hardcoded
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - AUDIT_SECRET_KEY=${AUDIT_SECRET_KEY:-dev-audit-key-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/google-credentials.json
      - ENVIRONMENT=production
      # Secrets Manager
      - SECRETS_BACKEND=${SECRETS_BACKEND:-local}
      - SECRETS_FILE=/app/data/secrets.enc
      - SECRETS_KEY_FILE=/app/data/secrets.key
      - SECRETS_MASTER_PASSWORD=${SECRETS_MASTER_PASSWORD}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - KEY_ROTATION_DAYS=${KEY_ROTATION_DAYS:-90}
      - KEY_GRACE_PERIOD_DAYS=${KEY_GRACE_PERIOD_DAYS:-1}
      # Email
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL}
      - FROM_NAME=${FROM_NAME:-Agentic Analyst}
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - app_logs:/app/logs
      - app_charts:/app/agents/charts
      - app_data:/app/data
      - ../agentic-analyst-489012-a0aa86d33643.json:/app/credentials/google-credentials.json:ro
    networks:
      - agentic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  db:
    image: postgres:15-alpine
    container_name: agentic-analyst-db
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-agentic_analyst}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentic-analyst-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  agentic-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  app_logs:
  app_charts:
  app_data: