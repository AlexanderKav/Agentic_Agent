name: Performance Benchmarks

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM
  workflow_dispatch:
  pull_request:
    paths:
      - 'agents/**'
      - 'app/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-benchmark pytest-xdist
    
    - name: Create benchmarks directory
      run: mkdir -p benchmark-results
    
    - name: Run benchmarks
      run: |
        if [ -d "tests/benchmarks" ]; then
          pytest tests/benchmarks/ \
            --benchmark-only \
            --benchmark-json=benchmark-results/output.json \
            --benchmark-histogram \
            --benchmark-columns=mean,stddev,min,max,rounds
        else
          echo "No benchmarks directory found, creating placeholder..."
          echo '{"benchmarks": []}' > benchmark-results/output.json
        fi
      continue-on-error: false
    
    - name: Store benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ github.run_id }}
        path: |
          benchmark-results/
          .benchmarks/
        retention-days: 90