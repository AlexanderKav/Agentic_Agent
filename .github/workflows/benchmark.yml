name: Performance Benchmarks

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM
  workflow_dispatch:  # Allow manual trigger

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-benchmark
    
    - name: Create benchmarks directory
      run: |
        mkdir -p benchmark-results
    
    - name: Run benchmarks
      run: |
        # Check if benchmarks directory exists first
        if [ -d "tests/benchmarks" ]; then
          pytest tests/benchmarks/ --benchmark-only --benchmark-json benchmark-results/output.json
        else
          echo "No benchmarks directory found, skipping..."
          echo "{}" > benchmark-results/output.json
        fi
      continue-on-error: true
    
    - name: List benchmark files
      run: |
        ls -la benchmark-results/ || echo "No benchmark results"
    
    - name: Store benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark-results/
        retention-days: 30
        if-no-files-found: warn
    
    - name: Compare with previous benchmark
      run: |
        if [ -f "scripts/compare_benchmarks.py" ]; then
          python scripts/compare_benchmarks.py benchmark-results/output.json
        else
          echo "No comparison script found, skipping..."
        fi
      continue-on-error: true