name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist
    
    - name: Create necessary directories
      run: |
        mkdir -p htmlcov
        mkdir -p test-results
    
    - name: List directory structure
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Files in root ==="
        ls -la
        echo "=== tests directory ==="
        ls -la tests/ || echo "tests/ not found"
        echo "=== tests/unit directory ==="
        ls -la tests/unit/ || echo "tests/unit/ not found"
    
    - name: Run unit tests with detailed output
      run: |
        pytest tests/unit -v --tb=long -s --maxfail=1
      continue-on-error: true
    
    - name: Run integration tests with detailed output
      run: |
        pytest tests/integration -v --tb=long -s --maxfail=1
      continue-on-error: true
    
    - name: Check exit status
      run: |
        echo "Unit test exit code: ${{ job.steps.run-unit-tests.outcome }}"
        echo "Integration test exit code: ${{ job.steps.run-integration-tests.outcome }}"
    
    - name: Upload test logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-logs-${{ matrix.python-version }}
        path: |
          .pytest_cache/
          test-results/
        retention-days: 7