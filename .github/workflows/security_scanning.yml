name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci || npm install
    
    - name: Install security tools
      run: |
        pip install bandit safety pip-audit
    
    - name: Run Bandit security linter
      run: bandit -r agents/ app/ -f json -o bandit-report.json || true
    
    - name: Run Safety check
      run: safety check --json --output safety-report.json || true
    
    - name: Run pip-audit (Python vulnerabilities)
      run: |
        pip-audit --requirement requirements.txt --format json --output pip-audit-report.json || true
    
    - name: Run npm audit (frontend vulnerabilities)
      working-directory: frontend
      run: |
        npm audit --json > npm-audit-report.json || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
          pip-audit-report.json
          frontend/npm-audit-report.json
        retention-days: 90
    
    # Only warn, don't fail
    - name: Check for critical vulnerabilities
      run: |
        echo "📊 Security scan completed"
        echo "Reports available in artifacts"