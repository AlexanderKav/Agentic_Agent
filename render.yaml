services:
  - type: web
    name: agentic-analyst
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentic-analyst-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AUDIT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false

  - type: postgres
    name: agentic-analyst-db
    plan: starter