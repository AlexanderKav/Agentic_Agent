services:
  - type: web
    name: agentic-analyst-backend
    runtime: image
    repo: https://github.com/AlexanderKav/agentic-analyst
    plan: free
    dockerfilePath: ./docker/Dockerfile.prod
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentic-analyst-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agentic-analyst-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AUDIT_SECRET_KEY
        generateValue: true
      - key: DB_ENCRYPTION_KEY
        generateValue: true
      - key: SECRETS_MASTER_PASSWORD
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        value: "https://agentic-analyst.vercel.app,https://*.vercel.app"
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /app/credentials/google-credentials.json
    healthCheckPath: /health

  - type: postgresql
    name: agentic-analyst-db
    plan: free
    databaseName: agentic_analyst
    ipAllowList: []

  - type: redis
    name: agentic-analyst-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
